apiVersion: management.loft.sh/v1
kind: VirtualClusterInstance
metadata:
  name: {{ .Values.name }}-01
  namespace: {{ .Values.namespace }}
spec:
  networkPeer: {{ .Values.networkPeer }}
  owner:
    user: {{ .Values.owner.user }}
  template:
    accessPoint:
      ingress: {}
    helmRelease:
      chart:
        version: {{ .Values.helmRelease.chart.version | quote }}
      values: |
{{ .Values.helmRelease.values | toYaml | indent 8 }}
    instanceTemplate:
      metadata: {}
    metadata: {}
    pro: {}
    spaceTemplate:
      metadata: {}
